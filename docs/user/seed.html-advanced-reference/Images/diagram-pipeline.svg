<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" role="img" aria-label="A plain-text source becomes a rendered chapter in two passes: a transformText script turns the source into HTML, then a transformDOM script turns that HTML into the final XHTML shown in the preview and packaged in the EPUB.">
  <defs>
    <marker id="ah-gray" viewBox="0 0 6 6" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6b7280"/></marker>
  </defs>

  <!-- source: a plain-text page -->
  <text x="40" y="30" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b7280">source</text>
  <rect x="14" y="38" width="52" height="64" rx="5" fill="none" stroke="#6b7280" stroke-width="3"/>
  <line x1="25" y1="54" x2="55" y2="54" stroke="#6b7280" stroke-width="2.5"/>
  <line x1="25" y1="66" x2="55" y2="66" stroke="#6b7280" stroke-width="2.5"/>
  <line x1="25" y1="78" x2="55" y2="78" stroke="#6b7280" stroke-width="2.5"/>
  <line x1="25" y1="90" x2="45" y2="90" stroke="#6b7280" stroke-width="2.5"/>

  <!-- source -> transformText -->
  <path d="M66 70 H96" fill="none" stroke="#6b7280" stroke-width="3" marker-end="url(#ah-gray)"/>

  <!-- pass 1: transformText -->
  <rect x="98" y="56" width="104" height="28" rx="14" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="150" y="74" text-anchor="middle" font-family="monospace" font-size="11" fill="#2563eb">transformText</text>

  <!-- transformText -> transformDOM (HTML between) -->
  <text x="224" y="52" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6b7280">HTML</text>
  <path d="M202 70 H246" fill="none" stroke="#6b7280" stroke-width="3" marker-end="url(#ah-gray)"/>

  <!-- pass 2: transformDOM -->
  <rect x="248" y="56" width="104" height="28" rx="14" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="300" y="74" text-anchor="middle" font-family="monospace" font-size="11" fill="#2563eb">transformDOM</text>

  <!-- transformDOM -> chapter (XHTML between) -->
  <text x="376" y="52" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6b7280">XHTML</text>
  <path d="M352 70 H398" fill="none" stroke="#6b7280" stroke-width="3" marker-end="url(#ah-gray)"/>

  <!-- output: a rendered chapter (filled heading bar = formatted page) -->
  <text x="432" y="30" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b7280">chapter</text>
  <rect x="406" y="38" width="52" height="64" rx="5" fill="none" stroke="#6b7280" stroke-width="3"/>
  <rect x="416" y="52" width="32" height="7" rx="2" fill="#6b7280"/>
  <line x1="416" y1="70" x2="448" y2="70" stroke="#6b7280" stroke-width="2.5"/>
  <line x1="416" y1="80" x2="448" y2="80" stroke="#6b7280" stroke-width="2.5"/>
  <line x1="416" y1="90" x2="440" y2="90" stroke="#6b7280" stroke-width="2.5"/>
</svg>
