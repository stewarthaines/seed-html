<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 200" role="img" aria-label="A SEED EPUB contains the ordinary readable book plus a SEED.zip archive of the book's source.">
  <!-- the EPUB container -->
  <text x="90" y="26" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6b7280">SEED EPUB</text>
  <rect x="16" y="34" width="148" height="152" rx="8" fill="none" stroke="#6b7280" stroke-width="3"/>

  <!-- the ordinary readable book (a rendered chapter) -->
  <rect x="67" y="48" width="46" height="52" rx="4" fill="none" stroke="#6b7280" stroke-width="3"/>
  <rect x="75" y="58" width="30" height="6" rx="1" fill="#6b7280"/>
  <line x1="75" y1="74" x2="105" y2="74" stroke="#6b7280" stroke-width="2.5"/>
  <line x1="75" y1="84" x2="105" y2="84" stroke="#6b7280" stroke-width="2.5"/>
  <line x1="75" y1="94" x2="97" y2="94" stroke="#6b7280" stroke-width="2.5"/>
  <text x="90" y="115" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6b7280">the book</text>

  <!-- SEED.zip: the source archive (the SEED-specific addition) -->
  <rect x="50" y="128" width="80" height="42" rx="5" fill="none" stroke="#2563eb" stroke-width="3"/>
  <line x1="90" y1="128" x2="90" y2="143" stroke="#2563eb" stroke-width="2"/>
  <line x1="86" y1="132" x2="94" y2="132" stroke="#2563eb" stroke-width="2"/>
  <line x1="86" y1="137" x2="94" y2="137" stroke="#2563eb" stroke-width="2"/>
  <text x="90" y="162" text-anchor="middle" font-family="monospace" font-size="10" fill="#2563eb">SEED.zip</text>
</svg>
